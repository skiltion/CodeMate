<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>회원가입</title>
  <link rel="stylesheet" href="style1.css" />
  <link rel="stylesheet" href="../dropdown.css">
  <link rel="icon" type="image/png" href="../co.png" />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="header">
    <div class="logo-area" onclick="location.href='../main/main.html'">
      <img src="../co.png" alt="로고" class="logo-image" />
      <span class="logo-text">코드메이트</span>
    </div>
  </header>

  <div class="auth-wrapper">
    <h2>회원가입</h2>
    <form id="signupForm">
      <input type="text" name="username" placeholder="사용자 이름" required />
      <input type="email" name="email" placeholder="이메일" required />
      <input type="password" name="password" placeholder="비밀번호" required />
      <input type="password" name="passwordConfirm" placeholder="비밀번호 확인" required />
      <button type="submit">가입하기</button>
    </form>
    <div class="redirect-link">
      이미 계정이 있나요? <a href="login.html">로그인</a>
    </div>
  </div>

  <script src="sign.js"></script>
</body>
</html>
